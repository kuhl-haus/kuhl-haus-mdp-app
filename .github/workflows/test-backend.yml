name: Backend Tests

on:
  push:
    branches: [ mainline ]
  pull_request:
    branches: [ mainline ]

permissions:
  contents: read

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install --no-cache-dir -e ".[testing]"

      - name: Run tests
        run: pytest --cov=apps --cov-report=xml tests/ -v
