name: Build Images
permissions:
  contents: read
  pull-requests: write

# Re-declared per-job for least-privilege; top-level is intentionally restrictive.

on:
  push:
    branches: [ mainline ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest

    permissions:
      packages: write  # IMPORTANT: mandatory for publishing packages
      # https://docs.github.com/en/packages/learn-github-packages/about-permissions-for-github-packages#about-scopes-and-permissions-for-package-registries

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for tags

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependencies
        run: pip install --no-cache-dir -e ".[testing]"

      - name: Determine image tag
        id: determine_tag
        run: |
          # Try to get tag from git
          GIT_TAG=$(git describe --tags --exact-match 2>/dev/null || echo "")
      
          if [ -n "$GIT_TAG" ]; then
            # Remove 'v' prefix if present
            IMAGE_TAG=${GIT_TAG#v}
            echo "Using git tag: $IMAGE_TAG"
          else
            # Install setuptools-scm if not already available
            pip install setuptools-scm >/dev/null 2>&1
      
            # Get version from setuptools-scm with no-local-version
            VERSION=$(python -c "from setuptools_scm import get_version; print(get_version(local_scheme='no-local-version'))" 2>/dev/null)
      
            if [ $? -ne 0 ] || [ -z "$VERSION" ]; then
              echo "Error: Could not determine version from setuptools-scm" >&2
              exit 1
            fi
      
            # Add commit hash as suffix for non-tagged builds
            COMMIT_SHORT=$(git rev-parse --short HEAD)
      
            # Format: version-hash (e.g., 0.1.1.dev2-a1b2c3d)
            IMAGE_TAG="${VERSION}-${COMMIT_SHORT}"
            echo "Using setuptools-scm version: $IMAGE_TAG"
          fi
      
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push MDP App Server Base Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./py4web.Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/kuhl-haus-mdp-app-server-base:${{ env.IMAGE_TAG }}
            ghcr.io/${{ github.repository_owner }}/kuhl-haus-mdp-app-server-base:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push MDP App Server Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./app.Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            IMAGE_VERSION=${{ env.IMAGE_TAG }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/kuhl-haus-mdp-app-server:${{ env.IMAGE_TAG }}
            ghcr.io/${{ github.repository_owner }}/kuhl-haus-mdp-app-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  github-release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/')  # only release on tag pushes
    needs: [ build-docker ]
    runs-on: ubuntu-latest

    permissions:
      contents: write  # IMPORTANT: mandatory for making GitHub Releases

    steps:
    - name: Create GitHub Release
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: >
        gh release create
        "$GITHUB_REF_NAME"
        --repo "$GITHUB_REPOSITORY"
        --notes ""
